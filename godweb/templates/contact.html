{% extends 'base.html' %}

{% block title %}Liên hệ - GodWeb{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1><i class="fas fa-envelope"></i> Liên hệ</h1>
        <p>Gửi tin nhắn cho chúng tôi</p>
    </div>
</div>

<section class="section">
    <div class="container contact-container">
        <div class="contact-layout">
            <div class="card contact-card">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-paper-plane"></i> Gửi tin nhắn</h3>
                <form>
                    <div class="form-group">
                        <label class="form-label">Họ tên</label>
                        <input type="text" class="form-control" placeholder="Nhập họ tên">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Nhập email">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nội dung</label>
                        <textarea class="form-control" rows="5" placeholder="Nhập nội dung tin nhắn"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-paper-plane"></i> Gửi tin nhắn
                    </button>
                </form>
            </div>

            <div>
                <div class="card contact-card secondary">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-map-marker-alt"></i> Thông tin liên hệ</h3>
                    <div class="contact-list">
                        <p><i class="fas fa-envelope contact-icon" style="color: var(--primary-color);"></i> support@godweb.com</p>
                        <p><i class="fab fa-telegram contact-icon" style="color: #0088cc;"></i> <a href="https://t.me/+THBiUkl2JmRmMzM1" target="_blank" style="color: var(--primary-color);">Telegram Group</a></p>
                        <p><i class="fab fa-tiktok contact-icon" style="color: #000;"></i> <a href="https://www.tiktok.com/@godexvn" target="_blank" style="color: var(--primary-color);">@godexvn</a></p>
                    </div>
                </div>

                <div class="card contact-card secondary">
                    <h3 style="margin-bottom: 20px;"><i class="fas fa-share-alt"></i> Kết nối với chúng tôi</h3>
                    <div class="social-links">
                        <a href="https://t.me/+THBiUkl2JmRmMzM1" target="_blank" class="social-link" style="background: #0088cc;">
                            <i class="fab fa-telegram"></i>
                        </a>
                        <a href="https://www.tiktok.com/@godexvn" target="_blank" class="social-link" style="background: #000;">
                            <i class="fab fa-tiktok"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
